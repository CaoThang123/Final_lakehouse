version: "3.8"

services:
  # ---------------- Spark Cluster ----------------
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master_v1
    # Trong image apache, lệnh để khởi động master là thông qua script này
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MODE=master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - shared_jars:/opt/spark/jars
      - ./airflow/dags:/opt/airflow/dags
    networks:
      - iceberg_env

  spark_worker_1:
    image: apache/spark:3.5.1
    container_name: spark_worker_1_v1
    # Lệnh khởi động worker và trỏ về host của master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - shared_jars:/opt/spark/jars
    networks:
      - iceberg_env

  spark_worker_2:
    image: apache/spark:3.5.1
    container_name: spark_worker_2_v1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - shared_jars:/opt/spark/jars
    networks:
      - iceberg_env

  spark_notebook:
    image: jupyter/pyspark-notebook
    container_name: notebook_v1
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    ports: 
      - 8888:8888   # Jupyter Notebook UI
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./mlflow/mlruns:/mlflow/mlruns
    env_file: .env
    networks:
      - iceberg_env

  # ---------------- MinIO ----------------
  minio_server:
    image: minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - 9000:9000   # API
      - 9001:9001   # Console
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_storage:/data
    networks:
      - iceberg_env

  # ---------------- Dremio ----------------
  dremio:
    image: dremio/dremio-oss:latest
    container_name: dremio_v1
    ports:
      - 9047:9047   # Web UI
      - 31010:31010 # JDBC
      - 32010:32010 # Flight SQL
    networks:
      - iceberg_env

  # ---------------- Nessie ----------------
  nessie:
    image: ghcr.io/projectnessie/nessie:0.105.6
    container_name: nessie_v1
    ports:
      - 19120:19120
    volumes:
      - ./nessie_data:/var/lib/nessie
    environment:
      - NESSIE_VERSION_STORE_TYPE=JDBC
      - QUARKUS_DATASOURCE_DB_KIND=postgresql
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/nessie
      - QUARKUS_DATASOURCE_USERNAME=nessie_user
      - QUARKUS_DATASOURCE_PASSWORD=nessie_pass
      - QUARKUS_OPENTELEMETRY_TRACER_EXPORTER_OTLP_ENABLED=false

    depends_on:
      - postgres
    networks:
      - iceberg_env

  # ---------------- Postgres for Nessie ----------------
  postgres:
    image: postgres:15
    container_name: postgres_v1
    environment:
      - POSTGRES_DB=nessie
      - POSTGRES_USER=nessie_user
      - POSTGRES_PASSWORD=nessie_pass
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - iceberg_env

  # ---------------- Superset ----------------
  dashboards:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: dashboards_v1
    environment:
      - SUPERSET_SECRET_KEY=60FTM+mZv0plqhUrWRQtDBBSymw6raRJV2CDmY2hu5AoGpa6ggTx3gHA
    ports:
      - 8088:8088  
    networks:
      - iceberg_env

  # ---------------- Airflow Initialization ----------------
  airflow-init:
    image: apache/airflow:2.8.0
    container_name: airflow-init_v1
    depends_on:
      - airflow-postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@airflow-postgres:5432/airflow_db
    user: airflow
    entrypoint: /bin/bash
    command: >
      -c "
        echo 'Waiting for Postgres...' &&
        until nc -z airflow-postgres 5432; do
          sleep 2;
          echo 'Postgres not ready yet...';
        done &&
        echo 'Postgres ready, initializing Airflow DB...' &&
        airflow db init &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/jars:/opt/airflow/jars
    networks:
      - iceberg_env
  # ---------------- Airflow ----------------
  # Airflow Webserver
  airflow-webserver:
    container_name: airflow-webserver_v1
    build:
      context: .
      dockerfile: Dockerfile.airflow
    restart: always
    depends_on:
      - airflow-init
      - airflow-postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@airflow-postgres:5432/airflow_db
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
    command: ["webserver"]
    ports:
      - 8081:8080
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./notebooks:/home/jovyan/notebooks
      - shared_jars:/opt/airflow/jars
    networks:
      - iceberg_env
    # Airflow Scheduler
  airflow-scheduler:
    container_name: airflow-scheduler_v1
    build:
      context: .
      dockerfile: Dockerfile.airflow
    restart: always
    depends_on:
      - airflow-init
      - airflow-webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@airflow-postgres:5432/airflow_db
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
    command: ["scheduler"]
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./notebooks:/home/jovyan/notebooks
      - shared_jars:/opt/airflow/jars
    networks:
      - iceberg_env

  # ---------------- MLflow ----------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: mlflow_v1
    environment:
      - BACKEND_STORE_URI=sqlite:///mlflow.db
      - ARTIFACT_ROOT=/mlflow/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/mlruns
      --host 0.0.0.0
      --port 5000
    ports:
      - 5000:5000
    volumes:
      - ./mlflow/mlruns:/mlflow/mlruns
    networks:
      - iceberg_env


  # ---------------- Postgres for Airflow ----------------
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres_v1
    environment:
      - POSTGRES_DB=airflow_db
      - POSTGRES_USER=airflow_user
      - POSTGRES_PASSWORD=airflow_pass
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - ./postgres_airflow_data:/var/lib/postgresql/data
    networks:
      - iceberg_env


# ---------------- Zookeeper ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0 # Nên dùng version cụ thể thay vì :latest
    container_name: zookeeper_v1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    healthcheck:
      test: ["CMD", "nc", "-vz", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iceberg_env

  # ---------------- Kafka ----------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_v1
    depends_on:
      zookeeper:
        condition: service_healthy # Chỉ khởi động khi Zookeeper thực sự sẵn sàng
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      
      # Phân tách rõ ràng Internal (cho Spark/Connect) và External (cho App chạy local)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      
      # Cấu hình tối ưu cho môi trường Dev nhưng vẫn đảm bảo bền vững
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168 # Giữ data trong 1 tuần
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true" # Dev nên để true, Prod phải để false
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - iceberg_env

  # ---------------- Kafka Connect ----------------
  kafka-connect:
    build:
      context: .
      dockerfile: Dockerfile.kafka
    container_name: kafka-connect_v1
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: 'kafka:29092'
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: "connect-cluster"
      CONNECT_CONFIG_STORAGE_TOPIC: "docker-connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "docker-connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "docker-connect-status"
      # Chuẩn hóa Replication Factor cho các topic hệ thống của Connect
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
    volumes:
      - ./kafka_connect_data/unprocessed:/data/unprocessed
      - ./kafka_connect_data/finished:/data/finished
      - ./kafka_connect_data/error:/data/error
    networks:
      - iceberg_env
# ---------------- Networks & Volumes ----------------
networks:
  iceberg_env:
    driver: bridge

volumes:
  shared_jars:
